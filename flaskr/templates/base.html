<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <script type="importmap">
            {
                "imports": {
                    "three": "https://cdn.jsdelivr.net/npm/three@0.168.0/build/three.module.js",
                    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.168.0/examples/jsm/"
                }
            }
        </script>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
        <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
        <title>{{ title }} - Microblog</title>
    </head>
    <body>
        <div class="page">
            <aside class="sidebar-drawer">
                <div class="sidebar-container">
                    <div class="sidebar-sticky">
                        <div class="sidebar-brand">
                            <span class="sidebar-brand-text">{{ title }}</span>
                            <div class="sidebar-scroll">
                                <div class="sidebar-tree">
                                    {% block sideaccordion %}{% endblock %}
                                    <!-- {% block sidebar %}{% endblock %} -->
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </aside>
            <div class="main">
                <div class="content">
                    <div class="article-container">
                        <article role="main">
                            {% block content %}{% endblock %}
                        </article>
                    </div>
                    <footer>
                        <div class="related-pages">
                            {% if footer_data.next %}
                                <a class="next-page" href="{{ footer_data.next.href }}">
                                    <div class="page-info">
                                        <div class="context">
                                            <span>Next</span>
                                        </div>
                                        <div class="title">{{ footer_data.next.html }}</div>
                                    </div>
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-chevron-right" viewBox="0 0 16 16">
                                        <path fill-rule="evenodd" d="M4.646 1.646a.5.5 0 0 1 .708 0l6 6a.5.5 0 0 1 0 .708l-6 6a.5.5 0 0 1-.708-.708L10.293 8 4.646 2.354a.5.5 0 0 1 0-.708"/>
                                    </svg>
                                </a>
                            {% endif %}
                            {% if footer_data.prev %}
                                 <a class="prev-page" href="{{ footer_data.prev.href }}">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-chevron-left" viewBox="0 0 16 16">
                                        <path fill-rule="evenodd" d="M11.354 1.646a.5.5 0 0 1 0 .708L5.707 8l5.647 5.646a.5.5 0 0 1-.708.708l-6-6a.5.5 0 0 1 0-.708l6-6a.5.5 0 0 1 .708 0"/>
                                    </svg>
                                    <div class="page-info">
                                        <div class="context">
                                            <span>Previous</span>
                                        </div>
                                        <div class="title">{{ footer_data.prev.html }}</div>
                                    </div>
                                 </a>
                            {% endif %}
                        </div>
                    </footer>
                </div>
            </div>
        </div>
        <div class="modal lightbox-modal" tabindex="-1">
            <div class="modal-dialog modal-fullscreen">
                <div class="modal-content">
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                    <div class="modal-body">
                        <div class="container-fluid p-0">
                            <!-- JS content here -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
        <script src="https://cdn.jsdelivr.net/npm/bs5-lightbox@1.8.3/dist/index.bundle.min.js"></script>
    </body>
</html>
